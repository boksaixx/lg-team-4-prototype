<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>첫 번째 웹 페이지</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4a00e0, #8e2de2, #c471ed);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 60px 80px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 480px;
      width: 90%;
    }

    h1 {
      font-size: 2.8rem;
      color: #3a0080;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 1.15rem;
      color: #666;
      margin-bottom: 40px;
    }

    button {
      background: linear-gradient(135deg, #4a00e0, #8e2de2);
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(142, 45, 226, 0.5);
    }

    button:active {
      transform: translateY(0);
    }

    .message {
      display: none;
      margin-top: 28px;
      font-size: 1.4rem;
      color: #8e2de2;
      font-weight: 600;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      0%   { transform: scale(0.7); opacity: 0; }
      80%  { transform: scale(1.1); }
      100% { transform: scale(1);   opacity: 1; }
    }

    footer {
      margin-top: 40px;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>안녕하세요 👋</h1>
    <p class="subtitle">제 첫 번째 웹 페이지예요</p>
    <button onclick="showMessage()">눌러보기</button>
    <div class="message" id="msg">🎉 잘 작동해요!</div>
  </div>

  <footer>LG U+ Lifestyle Innovation Workshop</footer>

  <script>
    function showMessage() {
      const msg = document.getElementById('msg');
      msg.style.display = 'block';
    }
  </script>

</body>
</html>
