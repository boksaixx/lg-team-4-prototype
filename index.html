<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Campus Games — Stanford</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{min-height:100%;background:#f4f1ed;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:15px;color:#1a1a1a;overflow-x:hidden}

/* ─── Color tokens ─── */
:root{
  --red:#B83232;
  --red-light:#fbeaea;
  --red-mid:#e87575;
  --bg:#f4f1ed;
  --card:#ffffff;
  --border:#ebebeb;
  --text:#1a1a1a;
  --muted:#888;
  --green:#2d8c4e;
  --green-light:#e6f4ec;
  --amber:#d97706;
  --amber-light:#fef3c7;
}

/* ─── App shell ─── */
#app{display:flex;min-height:100vh}

/* ─── Sidebar (desktop only) ─── */
.sidebar{
  display:none;
  width:240px;
  flex-shrink:0;
  background:#fff;
  border-right:1px solid var(--border);
  flex-direction:column;
  padding:28px 16px 24px;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
}
.sidebar-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;padding:0 8px}
.sidebar-logo .logo-icon{width:36px;height:36px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
.sidebar-logo .logo-text{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.sidebar-logo .logo-sub{font-size:11px;color:var(--muted);margin-top:1px}
.sidebar-nav{display:flex;flex-direction:column;gap:4px;flex:1}
.sidebar-nav-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
  font-weight:500;
  color:#555;
  transition:all .15s;
  border:none;background:none;width:100%;text-align:left;
}
.sidebar-nav-item:hover{background:#f5f5f5;color:var(--text)}
.sidebar-nav-item.active{background:var(--red-light);color:var(--red);font-weight:700}
.sidebar-nav-item .s-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.sidebar-create{
  width:100%;padding:12px;background:var(--red);color:#fff;border:none;
  border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;
  transition:opacity .2s;
}
.sidebar-create:hover{opacity:.88}
.sidebar-lang{margin-top:16px;display:flex;background:#f5f5f5;border-radius:10px;padding:3px}
.lang-btn{
  flex:1;padding:7px;border:none;background:none;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s;
}
.lang-btn.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ─── Main area ─── */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;max-width:680px;margin:0 auto;width:100%}

/* ─── Pages ─── */
.page{flex:1;overflow-y:auto;padding-bottom:80px;display:none;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:.6;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ─── Top bar (mobile) ─── */
.topbar{
  background:#fff;
  padding:14px 16px 11px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.topbar-logo{display:flex;align-items:center;gap:9px}
.topbar-logo .t-icon{width:30px;height:30px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff}
.topbar-logo .t-name{font-size:18px;font-weight:800;letter-spacing:-.4px;color:var(--text)}
.topbar-actions{display:flex;gap:8px;align-items:center}
.topbar-lang{display:flex;background:#f0f0f0;border-radius:8px;padding:2px}
.t-lang-btn{padding:4px 9px;border:none;background:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;color:#888;transition:all .15s}
.t-lang-btn.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.topbar-icon{font-size:20px;cursor:pointer;padding:4px;background:none;border:none}
.location-row{display:flex;align-items:center;gap:6px;margin-top:5px}
.loc-dot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.loc-text{font-size:12px;color:var(--muted);font-weight:500}

/* ─── Filter chips ─── */
.filter-bar{
  background:#fff;
  padding:10px 14px;
  border-bottom:1px solid var(--border);
  display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none}
.chip{
  border:1.5px solid var(--border);
  background:#fff;
  border-radius:20px;padding:6px 14px;
  font-size:13px;font-weight:500;white-space:nowrap;
  cursor:pointer;transition:all .15s;color:#555;
  flex-shrink:0;
}
.chip:hover{border-color:#ccc;color:var(--text)}
.chip.on{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}

/* ─── Feed ─── */
.feed-wrap{padding:14px}
.feed-grid{display:flex;flex-direction:column;gap:10px}

/* ─── Game Card ─── */
.card{
  background:var(--card);
  border-radius:16px;
  padding:16px;
  display:flex;
  gap:13px;
  cursor:pointer;
  transition:transform .15s, box-shadow .15s;
  box-shadow:0 1px 6px rgba(0,0,0,.06);
  border:1px solid transparent;
}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:var(--border)}
.card:active{transform:none;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-thumb{
  width:84px;height:84px;border-radius:14px;
  flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:34px;
  position:relative;overflow:hidden;
}
.flag-badge{
  position:absolute;bottom:4px;right:4px;
  font-size:15px;line-height:1;
  background:rgba(255,255,255,.85);
  border-radius:4px;padding:1px 2px;
}
.card-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-title{font-size:15px;font-weight:700;line-height:1.35;flex:1;letter-spacing:-.2px}
.bookmark-btn{font-size:21px;flex-shrink:0;background:none;border:none;cursor:pointer;padding:0;transition:transform .2s}
.bookmark-btn:hover{transform:scale(1.2)}
.card-meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.meta-sep{color:#ddd}
.host-temp{font-weight:700;display:inline-flex;align-items:center;gap:2px}
.card-tags{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tag{
  font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:20px;
  letter-spacing:.2px;
}
.tag-open{background:var(--green-light);color:var(--green)}
.tag-full{background:#fee2e2;color:#b91c1c}
.tag-soon{background:var(--amber-light);color:var(--amber)}
.tag-match{background:var(--red-light);color:var(--red)}
.count-row{display:flex;align-items:center;gap:7px}
.count-text{font-size:12px;color:#666;white-space:nowrap}
.count-bar{height:4px;width:52px;background:#eee;border-radius:2px;overflow:hidden;flex-shrink:0}
.count-fill{height:100%;background:linear-gradient(90deg,var(--red),#e87575);border-radius:2px;transition:width .4s}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.card-loc{font-size:12px;color:#aaa;display:flex;align-items:center;gap:3px}
.heart-row{font-size:12px;color:#bbb;display:flex;align-items:center;gap:3px}

/* ─── Empty state ─── */
.empty-state{text-align:center;padding:80px 24px;color:#bbb}
.empty-state .e-icon{font-size:52px;margin-bottom:12px}
.empty-state .e-title{font-size:16px;font-weight:700;color:#999;margin-bottom:6px}
.empty-state .e-sub{font-size:14px;line-height:1.6}

/* ─── Bottom nav (mobile) ─── */
.bottomnav{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;
  border-top:1px solid var(--border);
  display:flex;
  z-index:200;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;padding:10px 0 11px;
  cursor:pointer;transition:color .15s;
  border:none;background:none;
}
.nav-icon{font-size:22px;line-height:1}
.nav-label{font-size:10px;margin-top:2px;color:var(--muted);font-weight:500}
.nav-item.active .nav-label{color:var(--red);font-weight:700}
.nav-center-wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding-bottom:11px}
.nav-center{
  background:var(--red);border-radius:50%;
  width:48px;height:48px;display:flex;
  align-items:center;justify-content:center;
  font-size:22px;color:#fff;
  margin-top:-18px;
  box-shadow:0 4px 16px rgba(184,50,50,.4);
  cursor:pointer;transition:transform .15s,opacity .15s;
}
.nav-center:hover{transform:scale(1.06)}
.nav-center-label{font-size:10px;color:var(--red);font-weight:700;margin-top:2px}

/* ─── Detail sheet ─── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(4px);
  z-index:300;display:none;
  align-items:flex-end;justify-content:center;
}
.overlay.show{display:flex}
.sheet{
  background:#fff;
  border-radius:24px 24px 0 0;
  width:100%;max-width:680px;
  max-height:92vh;overflow-y:auto;
  padding-bottom:env(safe-area-inset-bottom);
  animation:slideUp .3s cubic-bezier(.32,1.2,.36,1);
}
@keyframes slideUp{from{transform:translateY(60px);opacity:.5}to{transform:none;opacity:1}}
.sheet-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:12px auto 0}
.sheet-header{padding:18px 20px 14px;border-bottom:1px solid #f5f5f5}
.sheet-thumb{
  width:100%;height:172px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:68px;position:relative;margin-bottom:16px;
}
.sheet-flag-big{position:absolute;top:12px;right:14px;font-size:30px}
.sheet-title{font-size:21px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px}
.sheet-sub{font-size:13px;color:var(--muted)}
.sheet-body{padding:18px 20px}
.info-row{
  display:flex;align-items:center;gap:10px;
  padding:11px 0;border-bottom:1px solid #f8f8f8;
  font-size:14px;
}
.info-row:last-of-type{border-bottom:none}
.info-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.info-text{color:#444;flex:1}
.info-aside{font-size:12px;color:#bbb;flex-shrink:0}
.host-card{
  background:#fafafa;border-radius:14px;
  padding:14px;margin:16px 0;
}
.host-row{display:flex;align-items:center;gap:11px}
.host-avatar{
  width:44px;height:44px;border-radius:50%;
  background:var(--red);display:flex;align-items:center;
  justify-content:center;font-size:18px;color:#fff;font-weight:800;flex-shrink:0;
}
.host-name{font-size:14px;font-weight:700;margin-bottom:3px}
.host-temp-text{font-size:13px;font-weight:700}
.temp-bar-sm{height:5px;background:#eee;border-radius:3px;overflow:hidden;margin-top:5px}
.temp-fill-sm{height:100%;border-radius:3px;transition:width .5s}
.common-box{
  background:var(--red-light);border-radius:12px;
  padding:12px 14px;margin:0 0 16px;
}
.common-label{font-size:12px;font-weight:700;color:var(--red);margin-bottom:8px}
.common-tags{display:flex;gap:6px;flex-wrap:wrap}
.common-tag{background:var(--red);color:#fff;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600}
.progress-block{margin:16px 0}
.progress-labels{display:flex;justify-content:space-between;font-size:13px;margin-bottom:7px}
.progress-labels .pl-full{font-weight:700;color:#b91c1c}
.big-bar{height:10px;background:#eee;border-radius:5px;overflow:hidden}
.big-fill{height:100%;background:linear-gradient(90deg,var(--red),#e87575);border-radius:5px;transition:width .5s}
.participants-block{margin:16px 0}
.p-title{font-size:14px;font-weight:700;margin-bottom:10px}
.p-chips{display:flex;flex-wrap:wrap;gap:6px}
.p-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:#f5f5f5;border-radius:20px;
  padding:5px 11px 5px 6px;font-size:12px;font-weight:500;
}
.p-chip.match{background:var(--red-light);color:var(--red)}
.p-av{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;flex-shrink:0;
}
.action-btn{
  width:100%;padding:15px;
  border:none;border-radius:14px;
  font-size:16px;font-weight:800;
  cursor:pointer;margin-top:8px;
  transition:opacity .2s,transform .15s;
  letter-spacing:-.2px;
}
.action-btn:hover{opacity:.9;transform:translateY(-1px)}
.action-btn:active{transform:none}
.btn-join{background:var(--red);color:#fff}
.btn-leave{background:#fff;color:var(--red);border:2px solid var(--red)!important}
.btn-full{background:#e5e7eb;color:#9ca3af;cursor:not-allowed}

/* ─── Create page ─── */
.create-wrap{padding:20px 16px 0}
.page-heading{font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px}
.page-subheading{font-size:14px;color:var(--muted);margin-bottom:22px}
.form-section{margin-bottom:22px}
.form-label{font-size:13px;font-weight:700;color:#444;margin-bottom:9px;display:block;text-transform:uppercase;letter-spacing:.4px}
.game-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gt-card{
  border:2px solid var(--border);border-radius:14px;
  padding:14px 10px;text-align:center;
  cursor:pointer;transition:all .15s;background:#fff;
}
.gt-card:hover{border-color:#ccc}
.gt-card.selected{border-color:var(--red);background:var(--red-light)}
.gt-emoji{font-size:30px;margin-bottom:3px}
.gt-flag{font-size:15px;margin-bottom:4px}
.gt-name{font-size:13px;font-weight:700;color:#333}
.gt-time{font-size:11px;color:var(--muted);margin-top:2px}
.form-input{
  width:100%;padding:13px 14px;
  border:1.5px solid var(--border);
  border-radius:12px;font-size:15px;
  background:#fff;color:var(--text);
  outline:none;transition:border .15s;
  font-family:inherit;
}
.form-input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(184,50,50,.08)}
textarea.form-input{resize:none;height:80px;line-height:1.5}
.cap-row{display:flex;align-items:center;gap:14px}
.cap-btn{
  width:42px;height:42px;border-radius:50%;
  background:#f5f5f5;border:none;
  font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;color:var(--text);transition:background .15s;flex-shrink:0;
}
.cap-btn:hover{background:#ebebeb}
.cap-val{font-size:26px;font-weight:800;color:var(--red);min-width:40px;text-align:center}
.int-grid{display:flex;gap:8px;flex-wrap:wrap}
.int-chip{
  border:1.5px solid var(--border);border-radius:20px;
  padding:7px 14px;font-size:13px;cursor:pointer;
  transition:all .15s;background:#fff;font-weight:500;
}
.int-chip:hover{border-color:#ccc}
.int-chip.on{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}
.submit-btn{
  width:100%;padding:16px;
  background:var(--red);color:#fff;
  border:none;border-radius:14px;
  font-size:16px;font-weight:800;
  cursor:pointer;margin-top:8px;
  transition:opacity .2s,transform .15s;
  letter-spacing:-.2px;
}
.submit-btn:hover{opacity:.9;transform:translateY(-1px)}

/* ─── Profile page ─── */
.profile-wrap{padding:0}
.profile-hero{
  background:#fff;padding:28px 20px 22px;
  border-bottom:1px solid var(--border);
}
.profile-row{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.big-av{
  width:68px;height:68px;border-radius:50%;
  background:linear-gradient(135deg,var(--red),#e87575);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;color:#fff;font-weight:800;flex-shrink:0;
}
.profile-name{font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:2px}
.profile-sub{font-size:13px;color:var(--muted)}
.edit-btn{
  margin-left:auto;
  border:1.5px solid var(--border);
  border-radius:20px;padding:7px 15px;
  font-size:13px;background:#fff;
  cursor:pointer;font-weight:600;
  transition:border-color .15s;
}
.edit-btn:hover{border-color:#bbb}
.manner-card{
  background:linear-gradient(135deg,#fbeaea,#fff5f5);
  border:1.5px solid #fcd5d5;
  border-radius:16px;padding:16px;
  margin-bottom:16px;
}
.manner-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.manner-label{font-size:12px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.5px}
.manner-num{font-size:32px;font-weight:900;color:var(--red);letter-spacing:-1px}
.manner-bar{height:7px;background:#fcd5d5;border-radius:4px;overflow:hidden;margin:8px 0}
.manner-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2196f3,#ff9800,var(--red));transition:width .6s}
.manner-hint{font-size:11px;color:#c08080}
.stats-row{display:flex;gap:0;border:1.5px solid var(--border);border-radius:14px;overflow:hidden}
.stat-cell{flex:1;text-align:center;padding:14px 8px;border-right:1px solid var(--border)}
.stat-cell:last-child{border-right:none}
.stat-n{font-size:24px;font-weight:800;color:var(--red)}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}

.section-block{padding:18px 16px}
.section-title{font-size:16px;font-weight:800;letter-spacing:-.3px;margin-bottom:14px}
.badges-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.badge-tile{
  text-align:center;opacity:.25;
  transition:opacity .3s,transform .3s;
  cursor:default;
}
.badge-tile.earned{opacity:1}
.badge-tile:hover.earned{transform:scale(1.08)}
.b-emoji{font-size:30px;margin-bottom:4px}
.b-name{font-size:10px;color:#555;font-weight:700;letter-spacing:.2px}
.my-game-card{
  background:#fff;border-radius:14px;
  padding:14px;margin-bottom:10px;
  display:flex;gap:12px;align-items:center;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
  cursor:pointer;transition:transform .15s;
}
.my-game-card:hover{transform:translateY(-1px)}
.my-game-thumb{
  width:50px;height:50px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
}
.my-game-info{flex:1;min-width:0}
.my-game-title{font-size:14px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-game-sub{font-size:12px;color:var(--muted)}
.role-badge{
  font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;flex-shrink:0;
}

/* ─── Toast ─── */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(12px);
  background:#1a1a1a;color:#fff;
  padding:10px 20px;border-radius:20px;
  font-size:14px;opacity:0;
  transition:all .25s;pointer-events:none;
  z-index:999;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── Onboard modal ─── */
.onboard-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(8px);
  z-index:500;display:flex;
  align-items:center;justify-content:center;padding:20px;
}
.onboard-box{
  background:#fff;border-radius:24px;
  padding:32px 24px;width:100%;max-width:420px;
  animation:slideUp .35s cubic-bezier(.32,1.2,.36,1);
}
.ob-logo{width:52px;height:52px;background:var(--red);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;margin-bottom:18px}
.ob-title{font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}
.ob-sub{font-size:14px;color:var(--muted);margin-bottom:22px;line-height:1.6}
.ob-input{
  width:100%;padding:13px 15px;
  border:1.5px solid var(--border);
  border-radius:12px;font-size:16px;
  outline:none;font-family:inherit;
  margin-bottom:18px;transition:border .15s;
}
.ob-input:focus{border-color:var(--red)}
.ob-int-label{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
.ob-ints{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.ob-submit{
  width:100%;padding:15px;
  background:var(--red);color:#fff;
  border:none;border-radius:14px;
  font-size:16px;font-weight:800;
  cursor:pointer;transition:opacity .2s;
  letter-spacing:-.2px;
}
.ob-submit:hover{opacity:.9}

/* ─── Desktop responsive ─── */
@media (min-width:768px){
  body{background:#ede9e4}
  #app{max-width:1120px;margin:0 auto;min-height:100vh;gap:0}
  .sidebar{display:flex}
  .topbar,.bottomnav{display:none}
  .page{padding-bottom:32px}
  .main-area{border-left:1px solid var(--border);border-right:1px solid var(--border);background:#f4f1ed}
  .feed-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .card{flex-direction:column;gap:10px}
  .card-thumb{width:100%;height:110px;border-radius:12px;font-size:40px}
  .flag-badge{font-size:18px}
  .filter-bar{position:sticky;top:0;z-index:50}
  .overlay{align-items:center}
  .sheet{
    border-radius:20px;max-width:560px;
    max-height:85vh;margin:auto;
  }
  .toast{bottom:32px}
  .profile-wrap .section-block{padding:18px 20px}
  .create-wrap{padding:24px 20px 0;max-width:560px;margin:0 auto}
  body>*{} /* desktop root*/
  /* right panel on very wide */
}
@media (min-width:1100px){
  .main-area{max-width:none;flex:1}
  .feed-grid{grid-template-columns:1fr 1fr}
}

/* ─── Utilities ─── */
.divider{height:1px;background:var(--border);margin:0}
.mt-12{margin-top:12px}

let lang = localStorage.getItem('sg_lang') || 'ko';
function t(key, vars){let s=(TRANSLATIONS[lang]||TRANSLATIONS.ko)[key]||key;if(vars)Object.keys(vars).forEach(k=>{s=s.replace('{'+k+'}',vars[k]);});return s;}

function setLang(l){
  lang=l;
  localStorage.setItem('sg_lang',l);
  // update toggle btns
  ['tl-ko','tl-en','sl-ko','sl-en'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.toggle('active', id.endsWith(l.substring(0,2))||id==='tl-'+l||id==='sl-'+l);
  });
  document.querySelectorAll('[data-t]').forEach(el=>{
    const k=el.dataset.t; if(k) el.textContent=t(k);
  });
  document.querySelectorAll('[data-t-ph]').forEach(el=>{
    const k=el.dataset.tPh; if(k) el.placeholder=t(k);
  });
  document.querySelectorAll('[data-t-ph]').forEach(el=>{
    const k=el.getAttribute('data-t-ph'); if(k) el.placeholder=t(k);
  });
  // re-render dynamic content
  renderFilters();
  renderFeed();
  if(document.getElementById('page-profile').classList.contains('active')) renderProfile();
  if(document.getElementById('page-create').classList.contains('active')) renderCreateForm();
}

    {id:'g002',typeId:'sardine',title:'Sardines @ White Plaza 🐟',hostId:'u002',hostName:'Seo-Yeon L.',hostTemp:38.1,location:'White Plaza',datetime:new Date(Date.now()+1*24*h).toISOString(),capacity:8,players:['u002','u003','u004','u005','u006','u001','u002','u003'],interests:['🎬 Movies','✈️ Travel'],desc:'UK-style reverse hide & seek. Whoever finds the hider, hides with them!',createdAt:now-5*h,bookmarks:[]},
    {id:'g003',typeId:'flag',title:'Capture the Flag — Team Battle',hostId:'u003',hostName:'Jiho P.',hostTemp:36.5,location:'Oval Lawn',datetime:new Date(Date.now()+3*24*h).toISOString(),capacity:16,players:['u003','u004','u005'],interests:['🏃 Sports','🎨 Art'],desc:'Teams of 8, first to capture 3 flags wins!',createdAt:now-1*h,bookmarks:['u001','u004']},
    {id:'g004',typeId:'oni',title:'Oni Gokko — Japanese Tag 👹',hostId:'u004',hostName:'Yuna C.',hostTemp:40.7,location:'Lake Lag Beach',datetime:new Date(Date.now()+4*24*h).toISOString(),capacity:10,players:['u004','u006'],interests:['🎮 Gaming','☕ Coffee','🎵 Music'],desc:'Get tagged = become the oni. Chain reactions welcome!',createdAt:now-30*60*1000,bookmarks:[]},
    {id:'g005',typeId:'mugunghwa',title:'무궁화 꽃이 피었습니다 🌸',hostId:'u005',hostName:'Doyun J.',hostTemp:35.2,location:'Memorial Court',datetime:new Date(Date.now()+5*24*h).toISOString(),capacity:14,players:['u005','u001','u002','u003','u004','u006'],interests:['🍺 Drinks','🌙 Late Night'],desc:'Classic Korean game! Last one standing wins 🏆',createdAt:now-3*h,bookmarks:['u002']}
  ];
  S.set('sg_games',games);
}

function renderAll(){renderFilters();renderFeed();renderCreateForm();renderProfile();}

function getType(id){return GAME_TYPES.find(x=>x.id===id)||GAME_TYPES[0];}
function isFull(g){return g.players.length>=g.capacity;}
function isAlmostFull(g){return !isFull(g)&&g.players.length>=g.capacity*0.8;}
function commonInts(a,b){return(a||[]).filter(x=>(b||[]).includes(x));}

function timeAgo(ts){
  const m=Math.floor((Date.now()-new Date(ts).getTime())/60000);
  if(m<1) return t('ago_now');
  if(m<60) return m+t('ago_min');
  const h=Math.floor(m/60);
  if(h<24) return h+t('ago_hour');
  return Math.floor(h/24)+t('ago_day');
}

function tempColor(v){return v>=42?'#e53935':v>=38?'#f59e0b':'#3b82f6';}
function tempEmoji(v){return v>=42?'🔥':v>=38?'😊':'😐';}

function renderFilters(){
  const bar=document.getElementById('filter-bar');
  const filters=[
    {id:'all',k:'filter_all'},
    {id:'open',k:'filter_open'},
    {id:'soon',k:'filter_soon'},
    ...GAME_TYPES.map(gt=>({id:gt.id,label:gt.emoji+' '+gt.name[lang]}))
  ];
  bar.innerHTML=filters.map(f=>`<div class="chip${activeFilter===f.id?' on':''}" onclick="setFilter('${f.id}')">${f.label||t(f.k)}</div>`).join('');
}

function setFilter(f){activeFilter=f;renderFilters();renderFeed();}

function renderFeed(){
  const feed=document.getElementById('feed');
  const myInts=currentUser?currentUser.interests:[];
  let list=[...games].sort((a,b)=>b.createdAt-a.createdAt);
  if(activeFilter==='open') list=list.filter(g=>!isFull(g));
  else if(activeFilter==='soon') list=list.filter(g=>isAlmostFull(g));
  else if(activeFilter!=='all') list=list.filter(g=>g.typeId===activeFilter);
  if(!list.length){
    const [line1,line2]=(t('no_games')).split('\n');
    feed.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="e-icon">🎮</div><div class="e-title">${line1}</div><div class="e-sub">${line2||''}</div></div>`;
    return;
  }
  feed.innerHTML=list.map(g=>{
    const tp=getType(g.typeId);
    const full=isFull(g),almost=isAlmostFull(g);
    const pct=Math.round(g.players.length/g.capacity*100);
    const bked=currentUser&&(g.bookmarks||[]).includes(currentUser.id);
    const common=commonInts(myInts,g.interests);
    const tc=tempColor(g.hostTemp);
    const statusTag=full
      ?`<span class="tag tag-full">${t('status_full')}</span>`
      :almost?`<span class="tag tag-soon">${t('status_soon')}</span>`
      :`<span class="tag tag-open">${t('status_open')}</span>`;
    return `<div class="card" onclick="openGame('${g.id}')">
      <div class="card-thumb" style="background:${tp.color}18">
        <span>${tp.emoji}</span>
        <span class="flag-badge">${tp.flag}</span>
      </div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-title">${g.title}</div>
          <button class="bookmark-btn" onclick="toggleBookmark(event,'${g.id}')">${bked?'🧡':'🤍'}</button>
        </div>
        <div class="card-meta">
          <span>${g.hostName}</span>
          <span class="meta-sep">·</span>
          <span class="host-temp" style="color:${tc}">${tempEmoji(g.hostTemp)} ${g.hostTemp}°</span>
          <span class="meta-sep">·</span>
          <span>${timeAgo(g.createdAt)}</span>
        </div>
        <div class="card-tags">
          ${statusTag}
          <div class="count-row">
            <span class="count-text">${g.players.length}/${g.capacity}</span>
            <div class="count-bar"><div class="count-fill" style="width:${pct}%"></div></div>
          </div>
          ${common.length?`<span class="tag tag-match">${t('match_label',{n:common.length})}</span>`:''}
        </div>
        <div class="card-footer">
          <span class="card-loc">📍 ${g.location}</span>
          <span class="heart-row">${(g.bookmarks||[]).length} 🤍</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openGame(id){
  const g=games.find(x=>x.id===id); if(!g) return;
  const tp=getType(g.typeId);
  const full=isFull(g);
  const myInts=currentUser?currentUser.interests:[];
  const common=commonInts(myInts,g.interests);
  const isJoined=currentUser&&g.players.includes(currentUser.id);
  const pct=Math.round(g.players.length/g.capacity*100);
  const tc=tempColor(g.hostTemp);
  const dt=new Date(g.datetime);
  const dateStr=dt.toLocaleDateString(lang==='ko'?'ko':'en-US',{month:'short',day:'numeric',weekday:'short'});
  const timeStr=dt.toLocaleTimeString(lang==='ko'?'ko':'en-US',{hour:'2-digit',minute:'2-digit'});
  const demoPs=DEMO_USERS.filter(u=>g.players.includes(u.id));
  const spotsLeft=g.capacity-g.players.length;

  let actionBtn;
  if(isJoined) actionBtn=`<button class="action-btn btn-leave" onclick="leaveGame('${g.id}')">${t('leave_btn')}</button>`;
  else if(full) actionBtn=`<button class="action-btn btn-full" disabled>${t('full_btn')}</button>`;
  else actionBtn=`<button class="action-btn btn-join" onclick="joinGame('${g.id}')">${t('join_btn')}</button>`;

  document.getElementById('sheet-content').innerHTML=`
    <div class="sheet-header">
      <div class="sheet-thumb" style="background:${tp.color}18">
        <span style="font-size:68px">${tp.emoji}</span>
        <span class="sheet-flag-big">${tp.flag}</span>
      </div>
      <div class="sheet-title">${g.title}</div>
      <div class="sheet-sub">${tp.name[lang]} · ${tp.time} · ${tp.desc[lang]}</div>
    </div>
    <div class="sheet-body">
      <div class="info-row"><span class="info-icon">📍</span><span class="info-text">${g.location}</span></div>
      <div class="info-row"><span class="info-icon">📅</span><span class="info-text">${dateStr} ${timeStr}</span></div>
      <div class="info-row">
        <span class="info-icon">👥</span>
        <span class="info-text">${g.players.length}/${g.capacity}</span>
        <span class="info-aside" style="color:${full?'#e53935':'#888'}">${full?t('spots_full'):t('spots_left',{n:spotsLeft})}</span>
      </div>
      ${g.desc?`<div class="info-row"><span class="info-icon">💬</span><span class="info-text" style="color:#555">${g.desc}</span></div>`:''}
      <div class="host-card">
        <div class="host-row">
          <div class="host-avatar">${g.hostName[0]}</div>
          <div style="flex:1">
            <div class="host-name">👑 ${g.hostName} (${t('host_label')})</div>
            <div class="host-temp-text" style="color:${tc}">${tempEmoji(g.hostTemp)} ${lang==='ko'?'매너온도':''} ${g.hostTemp}°C</div>
            <div class="temp-bar-sm"><div class="temp-fill-sm" style="width:${Math.min(g.hostTemp,50)/50*100}%;background:${tc}"></div></div>
          </div>
        </div>
      </div>
      ${common.length?`<div class="common-box"><div class="common-label">${t('common_label',{n:common.length})}</div><div class="common-tags">${common.map(i=>`<span class="common-tag">${i}</span>`).join('')}</div></div>`:''}
      <div class="progress-block">
        <div class="progress-labels">
          <span>${t('people_label')}</span>
          <span class="${full?'pl-full':''}">${g.players.length}/${g.capacity} ${full?'('+t('status_full')+')':''}</span>
        </div>
        <div class="big-bar"><div class="big-fill" style="width:${pct}%"></div></div>
      </div>
      ${demoPs.length?`<div class="participants-block"><div class="p-title">${t('participants')}</div><div class="p-chips">${demoPs.map(p=>{const cm=commonInts(myInts,p.ints).length>0;return`<span class="p-chip${cm?' match':''}"><span class="p-av" style="background:${cm?'var(--red)':'#aaa'}">${p.name[0]}</span>${p.name}${cm?' ✓':''}</span>`;}).join('')}</div></div>`:''}
      ${actionBtn}
    </div>
  `;
  document.getElementById('overlay').classList.add('show');
}

function overlayClick(e){
  if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('show');
}

function joinGame(id){
  if(!currentUser){showToast(t('toast_need_login'));return;}
  const g=games.find(x=>x.id===id);
  if(!g||isFull(g)||g.players.includes(currentUser.id)) return;
  g.players.push(currentUser.id);
  S.set('sg_games',games);
  currentUser.joinedGames=[...(currentUser.joinedGames||[]),id];
  currentUser.joined=(currentUser.joined||0)+1;
  currentUser.gameTypes=[...new Set([...(currentUser.gameTypes||[]),g.typeId])];
  S.set('sg_user',currentUser);
  checkBadges();
  renderFeed();
  openGame(id);
  showToast(g.title.substring(0,20)+'... '+t('toast_joined'));
}

function leaveGame(id){
  if(!currentUser) return;
  const g=games.find(x=>x.id===id); if(!g) return;
  g.players=g.players.filter(p=>p!==currentUser.id);
  S.set('sg_games',games);
  currentUser.joinedGames=(currentUser.joinedGames||[]).filter(x=>x!==id);
  currentUser.joined=Math.max(0,(currentUser.joined||1)-1);
  S.set('sg_user',currentUser);
  renderFeed();
  openGame(id);
  showToast(t('toast_left'));
}

function toggleBookmark(e,id){
  e.stopPropagation();
  if(!currentUser){showToast(t('toast_need_login'));return;}
  const g=games.find(x=>x.id===id); if(!g) return;
  const bks=g.bookmarks||[];
  const idx=bks.indexOf(currentUser.id);
  if(idx>=0) bks.splice(idx,1); else bks.push(currentUser.id);
  g.bookmarks=bks;
  S.set('sg_games',games);
  renderFeed();
}

// ─── Create ─────────────────────────────────────────────────────
function renderCreateForm(){
  const grid=document.getElementById('game-type-grid');
  if(grid) grid.innerHTML=GAME_TYPES.map(tp=>`
    <div class="gt-card${selectedType===tp.id?' selected':''}" onclick="selectType('${tp.id}')">
      <div class="gt-emoji">${tp.emoji}</div>
      <div class="gt-flag">${tp.flag}</div>
      <div class="gt-name">${tp.name[lang]}</div>
      <div class="gt-time">${tp.time} · ${tp.desc[lang]}</div>
    </div>
  `).join('');
  const ig=document.getElementById('create-int-grid');
  if(ig) ig.innerHTML=INTERESTS.map(i=>`<div class="int-chip${createInts.includes(i)?' on':''}" onclick="toggleCreateInt('${i}')">${i}</div>`).join('');
  const cv=document.getElementById('cap-val');
  if(cv) cv.textContent=capValue;
  // apply translations
  document.querySelectorAll('#page-create [data-t]').forEach(el=>{const k=el.dataset.t;if(k)el.textContent=t(k);});
  document.querySelectorAll('#page-create [data-t-ph]').forEach(el=>{const k=el.getAttribute('data-t-ph');if(k)el.placeholder=t(k);});
  // sidebar button text
  const sb=document.querySelector('.sidebar-create');
  if(sb) sb.textContent=t('post_game');
}

function selectType(id){
  selectedType=id;
  renderCreateForm();
  const titleEl=document.getElementById('c-title');
  if(titleEl&&!titleEl.value){
    const tp=getType(id);
    titleEl.value=tp.name[lang]+(lang==='ko'?' 같이 해요!':' — let\'s play!');
  }
}

function changeCap(d){capValue=Math.max(4,Math.min(30,capValue+d));document.getElementById('cap-val').textContent=capValue;}

function toggleCreateInt(i){
  const idx=createInts.indexOf(i);
  if(idx>=0) createInts.splice(idx,1);
  else if(createInts.length<3) createInts.push(i);
  else{showToast(t('toast_max_int'));return;}
  renderCreateForm();
}

function submitGame(){
  if(!currentUser){showToast(t('toast_need_login'));return;}
  if(!selectedType){showToast(t('toast_select_type'));return;}
  const title=document.getElementById('c-title').value.trim();
  if(!title){showToast(t('toast_enter_title'));return;}
  const loc=document.getElementById('c-location').value.trim();
  if(!loc){showToast(t('toast_enter_loc'));return;}
  const dt=document.getElementById('c-date').value;
  if(!dt){showToast(t('toast_enter_date'));return;}
  const desc=document.getElementById('c-desc').value.trim();
  const g={
    id:'g'+Date.now(),typeId:selectedType,title,
    hostId:currentUser.id,hostName:currentUser.name,hostTemp:currentUser.temp||36.5,
    location:loc,datetime:new Date(dt).toISOString(),
    capacity:capValue,players:[currentUser.id],
    interests:createInts,desc,createdAt:Date.now(),bookmarks:[]
  };
  games.unshift(g);
  S.set('sg_games',games);
  currentUser.hosted=(currentUser.hosted||0)+1;
  currentUser.hostIds=[...(currentUser.hostIds||[]),g.id];
  S.set('sg_user',currentUser);
  checkBadges();
  selectedType=null;capValue=8;createInts=[];
  ['c-title','c-location','c-date','c-desc'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  renderCreateForm();
  renderFeed();
  showPage('feed');
  showToast(t('toast_posted'));
}

// ─── Profile ────────────────────────────────────────────────────
function renderProfile(){
  if(!currentUser) return;
  const u=currentUser;
  document.getElementById('prof-av').textContent=u.name[0];
  document.getElementById('prof-name').textContent=u.name;
  document.getElementById('prof-sub').textContent='Stanford University · '+u.interests.slice(0,2).join(' ');
  const temp=u.temp||36.5;
  document.getElementById('prof-temp').textContent=temp.toFixed(1)+'°C';
  document.getElementById('prof-temp-bar').style.width=Math.min(temp,50)/50*100+'%';
  document.getElementById('s-joined').textContent=u.joined||0;
  document.getElementById('s-hosted').textContent=u.hosted||0;
  document.getElementById('s-bk').textContent=games.filter(g=>(g.bookmarks||[]).includes(u.id)).length;
  // apply translations to profile static labels
  document.querySelectorAll('#page-profile [data-t]').forEach(el=>{const k=el.dataset.t;if(k)el.textContent=t(k);});
  const earned=u.badges||[];
  document.getElementById('badges-grid').innerHTML=BADGES.map(b=>`
    <div class="badge-tile${earned.includes(b.id)?' earned':''}" title="${b.name[lang]}">
      <div class="b-emoji">${b.emoji}</div>
      <div class="b-name">${b.name[lang]}</div>
    </div>
  `).join('');
  const myGames=games.filter(g=>g.players.includes(u.id)||g.hostId===u.id);
  const mgl=document.getElementById('my-games-list');
  if(!myGames.length){
    const [l1,l2]=(t('no_mygames')).split('\n');
    mgl.innerHTML=`<div class="empty-state"><div class="e-icon">🎮</div><div class="e-title">${l1}</div><div class="e-sub">${l2||''}</div></div>`;
  } else {
    mgl.innerHTML=myGames.map(g=>{
      const tp=getType(g.typeId);
      const isHost=g.hostId===u.id;
      const full=isFull(g);
      const roleColor=isHost?'#ff6f0f':full?'#b91c1c':'var(--green)';
      const roleBg=isHost?'#fff3e0':full?'#fee2e2':'var(--green-light)';
      return`<div class="my-game-card" onclick="openGame('${g.id}')">
        <div class="my-game-thumb" style="background:${tp.color}18">${tp.emoji}</div>
        <div class="my-game-info">
          <div class="my-game-title">${g.title}</div>
          <div class="my-game-sub">📍 ${g.location} · ${g.players.length}/${g.capacity} ${tp.flag}</div>
        </div>
        <span class="role-badge" style="background:${roleBg};color:${roleColor}">${isHost?t('my_role_host'):t('my_role_join')}</span>
      </div>`;
    }).join('');
  }
}

function checkBadges(){
  if(!currentUser) return;
  const u=currentUser;
  const earned=u.badges||[];
  const newBadges=[];
  BADGES.forEach(b=>{if(!earned.includes(b.id)&&b.check(u)){earned.push(b.id);newBadges.push(b);}});
  if(newBadges.length){
    u.badges=earned;
    u.temp=Math.min(50,(u.temp||36.5)+newBadges.length*0.5);
    S.set('sg_user',u);
    newBadges.forEach((b,i)=>setTimeout(()=>showToast(t('toast_badge')+b.emoji+' '+b.name[lang]),i*1600));
    renderProfile();
  }
}

function editProfile(){
  const name=prompt(lang==='ko'?'닉네임 변경:':'Change username:',currentUser.name);
  if(name&&name.trim()){currentUser.name=name.trim();S.set('sg_user',currentUser);renderProfile();}
}

// ─── Onboard ────────────────────────────────────────────────────
let obInts=[];
function renderOnboardInts(){
  const el=document.getElementById('ob-ints');
  obInts=[];
  el.innerHTML=INTERESTS.map(i=>`<div class="int-chip" onclick="obToggleInt(this,'${i}')">${i}</div>`).join('');
  applyLang();
}
function obToggleInt(el,int){
  const idx=obInts.indexOf(int);
  if(idx>=0){obInts.splice(idx,1);el.classList.remove('on');}
  else if(obInts.length<3){obInts.push(int);el.classList.add('on');}
  else showToast(t('toast_max_int'));
}
function onboardSubmit(){
  const name=document.getElementById('ob-name').value.trim();
  if(!name){showToast(lang==='ko'?'닉네임을 입력해주세요':'Please enter a username');return;}
  if(obInts.length<1){showToast(lang==='ko'?'관심사를 1개 이상 선택해주세요':'Select at least 1 interest');return;}
  currentUser={id:'u'+Date.now(),name,interests:obInts,temp:36.5,joined:0,hosted:0,joinedGames:[],badges:[],gameTypes:[]};
  S.set('sg_user',currentUser);
  document.getElementById('onboard').style.display='none';
  renderAll();
  showToast(t('welcome')+name+'! 🎉');
}

// ─── Navigation ────────────────────────────────────────────────
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  // mobile bottom nav
  ['feed','profile'].forEach(p=>{
    const el=document.getElementById('nav-'+p);
    if(el) el.classList.toggle('active',p===page);
  });
  // sidebar nav
  ['feed','profile'].forEach(p=>{
    const el=document.getElementById('s-nav-'+p);
    if(el) el.classList.toggle('active',p===page);
  });
  if(page==='profile'){renderProfile();}
  if(page==='create'){renderCreateForm();}
}

// ─── Toast ─────────────────────────────────────────────────────
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

init();
</script>
</body>
