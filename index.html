<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🦑 스탠포드 게임 커뮤니티</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f5f0eb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:#1a1a1a}

/* Layout */
#app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:#f5f0eb;position:relative}
.page{flex:1;overflow-y:auto;padding-bottom:70px;display:none}
.page.active{display:block}

/* Top Bar */
.topbar{background:#fff;padding:14px 16px 12px;border-bottom:1px solid #eee;position:sticky;top:0;z-index:100}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:19px;font-weight:700;color:#ff6f0f}
.topbar-icons{display:flex;gap:14px;font-size:20px}
.topbar-icons span{cursor:pointer}
.location-row{display:flex;align-items:center;gap:6px;margin-top:2px}
.location-row .loc{font-size:13px;color:#666;font-weight:500}
.location-row .dot{width:6px;height:6px;background:#4caf50;border-radius:50%;display:inline-block}

/* Filter chips */
.filter-bar{background:#fff;padding:10px 16px;border-bottom:1px solid #eee;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.chip{border:1px solid #ddd;background:#fff;border-radius:20px;padding:6px 13px;font-size:13px;white-space:nowrap;cursor:pointer;transition:all .2s;color:#555}
.chip.on{background:#ff6f0f;border-color:#ff6f0f;color:#fff;font-weight:600}

/* Feed Cards */
.feed{padding:0}
.card{background:#fff;border-bottom:1px solid #efefef;padding:16px;display:flex;gap:12px;cursor:pointer;transition:background .1s}
.card:active{background:#f9f9f9}
.card-thumb{width:80px;height:80px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;overflow:hidden}
.flag-badge{position:absolute;bottom:3px;right:3px;font-size:16px;line-height:1}
.card-body{flex:1;min-width:0}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-title{font-size:15px;font-weight:600;line-height:1.3;flex:1}
.bookmark-btn{font-size:22px;flex-shrink:0;background:none;border:none;cursor:pointer;padding:0;line-height:1}
.card-meta{margin-top:4px;font-size:12px;color:#999;display:flex;align-items:center;gap:6px}
.card-meta .sep{color:#ddd}
.card-info{margin-top:7px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.status-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;letter-spacing:.3px}
.status-badge.open{background:#e8f5e9;color:#2e7d32}
.status-badge.full{background:#ffebee;color:#c62828}
.status-badge.soon{background:#fff3e0;color:#e65100}
.count-info{font-size:12px;color:#666;display:flex;align-items:center;gap:3px}
.count-bar{height:4px;width:60px;background:#eee;border-radius:2px;overflow:hidden}
.count-fill{height:100%;background:#ff6f0f;border-radius:2px;transition:width .3s}
.interest-match{font-size:11px;background:#fff3e0;color:#ff6f0f;padding:2px 7px;border-radius:8px;font-weight:600}
.temp-badge{font-size:12px;font-weight:600;display:flex;align-items:center;gap:3px}
.temp-badge.hot{color:#f44336}
.temp-badge.warm{color:#ff9800}
.temp-badge.cool{color:#2196f3}
.card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.heart-count{font-size:12px;color:#aaa;display:flex;align-items:center;gap:3px}

/* Section header */
.section-header{padding:16px 16px 8px;font-size:13px;font-weight:700;color:#999;letter-spacing:.5px;text-transform:uppercase}

/* Bottom nav */
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #eee;display:flex;z-index:200}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 12px;cursor:pointer;transition:color .2s}
.nav-item .nav-icon{font-size:22px;line-height:1}
.nav-item .nav-label{font-size:10px;margin-top:3px;color:#999}
.nav-item.active .nav-label{color:#ff6f0f;font-weight:700}
.nav-item.active .nav-icon{filter:none}
.nav-center{background:#ff6f0f;border-radius:50%;width:46px;height:46px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-top:-18px;box-shadow:0 2px 12px rgba(255,111,15,.4);cursor:pointer}

/* Bottom sheet modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding-bottom:30px}
.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0}
.sheet-header{padding:16px 20px 12px;border-bottom:1px solid #f0f0f0}
.sheet-game-thumb{width:100%;height:160px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:64px;position:relative;margin-bottom:14px}
.sheet-flag{position:absolute;top:12px;right:12px;font-size:28px}
.sheet-title{font-size:20px;font-weight:700;margin-bottom:4px}
.sheet-sub{font-size:13px;color:#888}
.sheet-body{padding:16px 20px}
.info-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:14px}
.info-row .info-icon{font-size:18px;width:24px;text-align:center}
.info-row .info-text{color:#333}
.info-row .info-label{font-size:12px;color:#999;margin-left:auto}
.host-card{background:#fafafa;border-radius:12px;padding:12px;margin:14px 0}
.host-card .host-row{display:flex;align-items:center;gap:10px}
.host-avatar{width:42px;height:42px;border-radius:50%;background:#ff6f0f;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:700;flex-shrink:0}
.host-info{flex:1}
.host-name{font-size:14px;font-weight:600}
.host-temp{font-size:13px;color:#ff6f0f;font-weight:600;display:flex;align-items:center;gap:4px}
.temp-bar-wrap{margin-top:4px}
.temp-bar{height:5px;background:#eee;border-radius:3px;overflow:hidden}
.temp-fill{height:100%;border-radius:3px;transition:width .5s}
.common-box{background:#fff3e0;border-radius:10px;padding:10px 12px;margin:12px 0}
.common-box .common-title{font-size:12px;color:#ff6f0f;font-weight:700;margin-bottom:6px}
.common-tags{display:flex;gap:6px;flex-wrap:wrap}
.common-tag{background:#ff6f0f;color:#fff;font-size:12px;padding:3px 9px;border-radius:10px}
.participants-section{margin-top:14px}
.participants-section h4{font-size:14px;font-weight:600;margin-bottom:10px}
.participant-chip{display:inline-flex;align-items:center;gap:5px;background:#f5f5f5;border-radius:20px;padding:5px 10px;margin:3px;font-size:12px}
.participant-chip.match{background:#fff3e0;color:#ff6f0f}
.p-avatar{width:22px;height:22px;border-radius:50%;background:#ccc;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.progress-section{margin:14px 0}
.progress-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.big-bar{height:10px;background:#eee;border-radius:5px;overflow:hidden}
.big-fill{height:100%;background:linear-gradient(90deg,#ff6f0f,#ff9800);border-radius:5px;transition:width .5s}
.join-btn{width:100%;padding:15px;background:#ff6f0f;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px;transition:opacity .2s}
.join-btn:disabled{background:#ccc;cursor:not-allowed}
.join-btn:hover:not(:disabled){opacity:.9}
.leave-btn{background:#fff;color:#ff6f0f;border:2px solid #ff6f0f}

/* Create page */
.create-page{padding:20px 16px}
.create-page h2{font-size:20px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:14px;font-weight:600;margin-bottom:7px;color:#333}
.form-group select,.form-group input,.form-group textarea{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;background:#fff;color:#1a1a1a;outline:none;transition:border .2s}
.form-group select:focus,.form-group input:focus,.form-group textarea:focus{border-color:#ff6f0f}
.form-group textarea{resize:none;height:80px;font-family:inherit}
.game-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.game-type-card{border:2px solid #eee;border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all .2s}
.game-type-card.selected{border-color:#ff6f0f;background:#fff3e0}
.game-type-card .gt-emoji{font-size:28px;margin-bottom:4px}
.game-type-card .gt-name{font-size:13px;font-weight:600}
.game-type-card .gt-flag{font-size:16px}
.cap-row{display:flex;align-items:center;gap:12px}
.cap-row input{flex:1}
.cap-row .cap-btn{width:40px;height:40px;border-radius:50%;background:#f0f0f0;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.cap-row .cap-val{font-size:20px;font-weight:700;width:32px;text-align:center;color:#ff6f0f}
.int-grid{display:flex;gap:8px;flex-wrap:wrap}
.int-chip{border:1.5px solid #ddd;border-radius:20px;padding:7px 13px;font-size:13px;cursor:pointer;transition:all .2s;background:#fff}
.int-chip.on{background:#ff6f0f;border-color:#ff6f0f;color:#fff;font-weight:600}
.submit-btn{width:100%;padding:15px;background:#ff6f0f;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}

/* Profile page */
.profile-page{padding:0}
.profile-header{background:#fff;padding:24px 20px 20px;border-bottom:1px solid #eee}
.profile-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px}
.big-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#ff6f0f,#ff9800);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:700;flex-shrink:0}
.profile-info{flex:1}
.profile-name{font-size:20px;font-weight:700;margin-bottom:2px}
.profile-sub{font-size:13px;color:#999}
.edit-btn{border:1.5px solid #ddd;border-radius:20px;padding:6px 14px;font-size:13px;background:#fff;cursor:pointer;font-weight:500}
.manner-section{background:#fff3e0;border-radius:12px;padding:14px;margin-bottom:14px}
.manner-title{font-size:13px;font-weight:700;color:#ff6f0f;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.manner-temp{font-size:32px;font-weight:800;color:#ff6f0f;margin-bottom:4px}
.manner-desc{font-size:12px;color:#888}
.stat-row{display:flex;gap:0;border:1.5px solid #eee;border-radius:12px;overflow:hidden;margin-bottom:14px}
.stat-item{flex:1;text-align:center;padding:14px 8px;border-right:1px solid #eee}
.stat-item:last-child{border-right:none}
.stat-num{font-size:22px;font-weight:700;color:#ff6f0f}
.stat-label{font-size:11px;color:#999;margin-top:2px}
.badges-section{background:#fff;border-radius:12px;padding:16px;margin:0 16px 14px}
.badges-title{font-size:15px;font-weight:700;margin-bottom:12px}
.badges-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.badge-item{text-align:center;opacity:.35;transition:opacity .3s}
.badge-item.earned{opacity:1}
.badge-emoji{font-size:28px;margin-bottom:4px}
.badge-name{font-size:10px;color:#555;font-weight:600}
.my-games-section{padding:0 16px}
.my-games-title{font-size:15px;font-weight:700;margin-bottom:10px}
.my-game-row{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:center}
.my-game-thumb{width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.my-game-info{flex:1}
.my-game-title{font-size:14px;font-weight:600}
.my-game-sub{font-size:12px;color:#999;margin-top:2px}
.my-game-status{font-size:12px;font-weight:700;padding:3px 8px;border-radius:8px}

/* Toast */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Onboard modal */
.onboard-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.onboard-box{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:400px}
.onboard-box h2{font-size:22px;font-weight:800;margin-bottom:6px;color:#ff6f0f}
.onboard-box p{font-size:14px;color:#666;margin-bottom:20px;line-height:1.6}
.onboard-box input{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;margin-bottom:12px;outline:none}
.onboard-box input:focus{border-color:#ff6f0f}
.onboard-submit{width:100%;padding:14px;background:#ff6f0f;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
.onboard-ints{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
</style>
</head>
<body>
<div id="app">
  <!-- Home Feed -->
  <div id="page-feed" class="page active">
    <div class="topbar">
      <div class="topbar-row">
        <h1>🦑 스탠포드 게임</h1>
        <div class="topbar-icons">
          <span title="알림">🔔</span>
          <span title="채팅">💬</span>
        </div>
      </div>
      <div class="location-row">
        <span class="dot"></span>
        <span class="loc">Stanford University Campus</span>
      </div>
    </div>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="feed" id="feed"></div>
  </div>

  <!-- Create Game -->
  <div id="page-create" class="page">
    <div class="create-page">
      <h2>🎮 게임 올리기</h2>
      <div class="form-group">
        <label>게임 종류 선택</label>
        <div class="game-type-grid" id="game-type-grid"></div>
      </div>
      <div class="form-group">
        <label>게임 제목</label>
        <input type="text" id="c-title" placeholder="예: 이번 금요일 경찰과 도둑">
      </div>
      <div class="form-group">
        <label>날짜 / 시간</label>
        <input type="datetime-local" id="c-date">
      </div>
      <div class="form-group">
        <label>장소</label>
        <input type="text" id="c-location" placeholder="예: Main Quad, White Plaza">
      </div>
      <div class="form-group">
        <label>최대 인원</label>
        <div class="cap-row">
          <button class="cap-btn" onclick="changeCap(-1)">−</button>
          <span class="cap-val" id="cap-val">8</span>
          <button class="cap-btn" onclick="changeCap(1)">+</button>
        </div>
      </div>
      <div class="form-group">
        <label>게임 설명 (선택)</label>
        <textarea id="c-desc" placeholder="어떤 분위기로 진행할지 알려주세요!"></textarea>
      </div>
      <div class="form-group">
        <label>관심사 태그 (선택)</label>
        <div class="int-grid" id="create-int-grid"></div>
      </div>
      <button class="submit-btn" onclick="submitGame()">게임 올리기 🎉</button>
    </div>
  </div>

  <!-- Profile -->
  <div id="page-profile" class="page">
    <div class="profile-page">
      <div class="profile-header">
        <div class="profile-top">
          <div class="big-avatar" id="prof-avatar">?</div>
          <div class="profile-info">
            <div class="profile-name" id="prof-name">—</div>
            <div class="profile-sub" id="prof-sub">Stanford University</div>
          </div>
          <button class="edit-btn" onclick="editProfile()">편집</button>
        </div>
        <div class="manner-section">
          <div class="manner-title">🌡️ 매너온도</div>
          <div class="manner-temp" id="prof-temp">36.5°C</div>
          <div class="temp-bar-wrap">
            <div class="temp-bar"><div class="temp-fill" id="prof-temp-bar" style="width:36.5%;background:linear-gradient(90deg,#2196f3,#ff9800,#f44336)"></div></div>
          </div>
          <div class="manner-desc" style="margin-top:6px">매너온도는 참여자들의 피드백으로 올라갑니다 👍</div>
        </div>
        <div class="stat-row">
          <div class="stat-item"><div class="stat-num" id="s-joined">0</div><div class="stat-label">참여한 게임</div></div>
          <div class="stat-item"><div class="stat-num" id="s-hosted">0</div><div class="stat-label">주최한 게임</div></div>
          <div class="stat-item"><div class="stat-num" id="s-bookmarks">0</div><div class="stat-label">관심 게임</div></div>
        </div>
      </div>
      <div class="badges-section">
        <div class="badges-title">🏅 내 뱃지</div>
        <div class="badges-grid" id="badges-grid"></div>
      </div>
      <div class="my-games-section">
        <div class="my-games-title">📋 내가 참여한 게임</div>
        <div id="my-games-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom nav -->
<nav class="bottomnav">
  <div class="nav-item active" id="nav-home" onclick="showPage('feed')">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">홈</div>
  </div>
  <div class="nav-item" style="display:flex;flex-direction:column;align-items:center;padding-bottom:12px">
    <div class="nav-center" onclick="showPage('create')">➕</div>
    <div style="font-size:10px;color:#ff6f0f;font-weight:700;margin-top:4px">올리기</div>
  </div>
  <div class="nav-item" id="nav-profile" onclick="showPage('profile')">
    <div class="nav-icon">👤</div>
    <div class="nav-label">프로필</div>
  </div>
</nav>

<!-- Game detail bottom sheet -->
<div class="overlay" id="overlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-content"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Onboard -->
<div class="onboard-overlay" id="onboard">
  <div class="onboard-box">
    <h2>🦑 안녕하세요!</h2>
    <p>스탠포드 게임 커뮤니티에 오신 걸 환영해요.<br>닉네임을 정하고 관심사를 선택해주세요!</p>
    <input type="text" id="ob-name" placeholder="닉네임 (예: 김스탠, Alex...)" maxlength="12">
    <div class="form-group" style="margin-bottom:0">
      <label style="font-size:13px;margin-bottom:8px;display:block">관심사 3가지 선택</label>
      <div class="onboard-ints" id="ob-ints"></div>
    </div>
    <button class="onboard-submit" onclick="onboardSubmit()">시작하기 🎮</button>
  </div>
</div>

<script>
const GAME_TYPES = [
  {id:'cops',name:'경찰과 도둑',emoji:'👮',flag:'🇰🇷',color:'#1a237e',desc:'캠퍼스 숨바꼭질',time:'30분'},
  {id:'mugunghwa',name:'무궁화 꽃이',emoji:'🌸',flag:'🇰🇷',color:'#880e4f',desc:'얼음 땡 포함',time:'20분'},
  {id:'flag',name:'깃발 뺏기',emoji:'🚩',flag:'🇺🇸',color:'#b71c1c',desc:'팀전 깃발 전투',time:'25분'},
  {id:'sardine',name:'정어리 게임',emoji:'🐟',flag:'🇬🇧',color:'#01579b',desc:'반대 숨바꼭질',time:'20분'},
  {id:'oni',name:'오니고꼬',emoji:'👹',flag:'🇯🇵',color:'#1b5e20',desc:'일본식 술래잡기',time:'15분'},
];

const INTERESTS = ['🎮 게임','🎬 영화','☕ 카페','🏃 운동','📚 공부','🎵 음악','✈️ 여행','🌙 야식','🍺 맥주','🎨 예술','📷 사진','🧘 명상'];

const BADGES = [
  {id:'first',emoji:'🌱',name:'첫발',desc:'첫 게임 참여',check:u=>u.joined>=1},

function renderAll(){
  renderFeed();

function timeAgo(ts){
  const diff = Date.now()-new Date(ts).getTime();
  const m = Math.floor(diff/60000);
  if(m<1) return '방금 전';
  if(m<60) return m+'분 전';
  const h = Math.floor(m/60);
  if(h<24) return h+'시간 전';
  return Math.floor(h/24)+'일 전';
}

function tempColor(t){
  if(t>=42) return '#f44336';
  if(t>=38) return '#ff9800';
  return '#2196f3';
}

function tempEmoji(t){
  if(t>=42) return '🔥';
  if(t>=38) return '😊';
  return '😐';
}

function isFull(g){ return g.players.length >= g.capacity; }

function isAlmostFull(g){ return !isFull(g) && g.players.length >= g.capacity * 0.8; }

function getType(id){ return GAME_TYPES.find(t=>t.id===id)||GAME_TYPES[0]; }

function commonInts(a,b){ return (a||[]).filter(x=>(b||[]).includes(x)); }

function renderFilters(){
  const bar = document.getElementById('filter-bar');
  const filters = [{id:'all',label:'전체'},{id:'open',label:'모집중'},{id:'soon',label:'마감임박'},{id:'cops',label:'경찰과도둑 🇰🇷'},{id:'sardine',label:'정어리 🇬🇧'},{id:'flag',label:'깃발뺏기 🇺🇸'},{id:'mugunghwa',label:'무궁화 🇰🇷'},{id:'oni',label:'오니고꼬 🇯🇵'}];
  bar.innerHTML = filters.map(f=>`<div class="chip${activeFilter===f.id?' on':''}" onclick="setFilter('${f.id}')">${f.label}</div>`).join('');
}

function setFilter(f){
  activeFilter=f;
  renderFilters();
  renderFeed();
}

function renderFeed(){
  const feed = document.getElementById('feed');
  const myInts = currentUser ? currentUser.interests : [];
  let list = [...games].sort((a,b)=>b.createdAt-a.createdAt);
  if(activeFilter==='open') list=list.filter(g=>!isFull(g));
  else if(activeFilter==='soon') list=list.filter(g=>isAlmostFull(g));
  else if(activeFilter!=='all') list=list.filter(g=>g.typeId===activeFilter);
  if(list.length===0){feed.innerHTML='<div style="text-align:center;padding:60px 20px;color:#aaa"><div style="font-size:48px;margin-bottom:12px">🎮</div><div>아직 게임이 없어요<br>첫 게임을 올려보세요!</div></div>';return;}
  feed.innerHTML = list.map(g=>{
    const t = getType(g.typeId);
    const full = isFull(g);
    const almost = isAlmostFull(g);
    const pct = Math.round(g.players.length/g.capacity*100);
    const bked = currentUser && (g.bookmarks||[]).includes(currentUser.id);
    const common = commonInts(myInts, g.interests);
    const tc = tempColor(g.hostTemp);
    return `<div class="card" onclick="openGame('${g.id}')">
      <div class="card-thumb" style="background:${t.color}20">
        <span>${t.emoji}</span>
        <span class="flag-badge">${t.flag}</span>
      </div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-title">${g.title}</div>
          <button class="bookmark-btn" onclick="toggleBookmark(event,'${g.id}')">${bked?'🧡':'🤍'}</button>
        </div>
        <div class="card-meta">
          <span>${g.hostName}</span><span class="sep">·</span>
          <span style="color:${tc};font-weight:600">${tempEmoji(g.hostTemp)} ${g.hostTemp}°</span>
          <span class="sep">·</span><span>${timeAgo(g.createdAt)}</span>
        </div>
        <div class="card-info">
          ${full?'<span class="status-badge full">마감</span>':almost?'<span class="status-badge soon">마감임박</span>':'<span class="status-badge open">모집중</span>'}

            <span>${g.players.length}/${g.capacity}명</span>
            <div class="count-bar"><div class="count-fill" style="width:${pct}%"></div></div>
          </div>

        </div>
        <div class="card-bottom">
          <span style="font-size:12px;color:#999">📍 ${g.location}</span>
          <span class="heart-count">${(g.bookmarks||[]).length} <span>🤍</span></span>

function closeSheet(e){
  if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('show');
}

function joinGame(id){
  if(!currentUser){showToast('먼저 프로필을 설정해주세요!');return;}
  const g = games.find(x=>x.id===id);
  if(!g||isFull(g)||g.players.includes(currentUser.id)) return;
  g.players.push(currentUser.id);
  S.set('sg_games',games);
  currentUser.joinedGames = [...(currentUser.joinedGames||[]),id];
  currentUser.joined = (currentUser.joined||0)+1;
  const t = getType(g.typeId);
  currentUser.gameTypes = [...new Set([...(currentUser.gameTypes||[]),g.typeId])];
  S.set('sg_user',currentUser);
  checkBadges();
  renderFeed();
  openGame(id);
  showToast('🎉 참여 완료! 게임 화이팅!');
}

function leaveGame(id){
  if(!currentUser) return;
  const g = games.find(x=>x.id===id);
  if(!g) return;
  g.players = g.players.filter(p=>p!==currentUser.id);
  S.set('sg_games',games);
  currentUser.joinedGames = (currentUser.joinedGames||[]).filter(x=>x!==id);
  currentUser.joined = Math.max(0,(currentUser.joined||1)-1);
  S.set('sg_user',currentUser);
  renderFeed();
  openGame(id);
  showToast('게임 취소했어요');
}

function toggleBookmark(e, id){
  e.stopPropagation();
  if(!currentUser){showToast('먼저 프로필을 설정해주세요!');return;}
  const g = games.find(x=>x.id===id);
  if(!g) return;
  const bks = g.bookmarks||[];
  const idx = bks.indexOf(currentUser.id);
  if(idx>=0) bks.splice(idx,1);
  else bks.push(currentUser.id);
  g.bookmarks = bks;
  S.set('sg_games',games);
  currentUser.bookmarkCount = games.filter(x=>(x.bookmarks||[]).includes(currentUser.id)).length;
  S.set('sg_user',currentUser);
  renderFeed();
}

// Create game
function renderCreateForm(){
  const grid = document.getElementById('game-type-grid');
  grid.innerHTML = GAME_TYPES.map(t=>`
    <div class="game-type-card${selectedType===t.id?' selected':''}" onclick="selectType('${t.id}')">
      <div class="gt-emoji">${t.emoji}</div>
      <div class="gt-flag">${t.flag}</div>
      <div class="gt-name">${t.name}</div>
    </div>
  `).join('');
  const intGrid = document.getElementById('create-int-grid');
  intGrid.innerHTML = INTERESTS.map((int,i)=>`<div class="int-chip${createInts.includes(int)?' on':''}" onclick="toggleCreateInt('${int}')">${int}</div>`).join('');
  document.getElementById('cap-val').textContent = capValue;
}

function selectType(id){
  selectedType = id;
  renderCreateForm();
  const t = getType(id);
  if(!document.getElementById('c-title').value){
    document.getElementById('c-title').value = t.name+' 같이 해요!';
  }
}

function changeCap(d){
  capValue = Math.max(4, Math.min(30, capValue+d));
  document.getElementById('cap-val').textContent = capValue;
}

function toggleCreateInt(int){
  const idx = createInts.indexOf(int);
  if(idx>=0) createInts.splice(idx,1);
  else if(createInts.length<3) createInts.push(int);
  else {showToast('관심사는 3개까지 선택 가능합니다');return;}
  renderCreateForm();
}

function submitGame(){
  if(!currentUser){showToast('먼저 프로필을 설정해주세요!');return;}
  if(!selectedType){showToast('게임 종류를 선택해주세요!');return;}
  const title = document.getElementById('c-title').value.trim();
  if(!title){showToast('제목을 입력해주세요!');return;}
  const loc = document.getElementById('c-location').value.trim();
  if(!loc){showToast('장소를 입력해주세요!');return;}
  const dt = document.getElementById('c-date').value;
  if(!dt){showToast('날짜/시간을 선택해주세요!');return;}
  const desc = document.getElementById('c-desc').value.trim();
  const newGame = {
    id:'g'+Date.now(),
    typeId:selectedType,
    title,
    hostId:currentUser.id,
    hostName:currentUser.name,
    hostTemp:currentUser.temp||36.5,
    location:loc,
    datetime:new Date(dt).toISOString(),
    capacity:capValue,
    players:[currentUser.id],
    interests:createInts,
    desc,
    createdAt:Date.now(),
    bookmarks:[]
  };
  games.unshift(newGame);
  S.set('sg_games',games);
  currentUser.hosted = (currentUser.hosted||0)+1;
  currentUser.hostIds = [...(currentUser.hostIds||[]),newGame.id];
  S.set('sg_user',currentUser);
  checkBadges();
  // reset form
  selectedType=null; capValue=8; createInts=[];
  document.getElementById('c-title').value='';
  document.getElementById('c-location').value='';
  document.getElementById('c-date').value='';
  document.getElementById('c-desc').value='';
  renderCreateForm();
  renderFeed();
  renderProfile();
  showPage('feed');
  showToast('🎉 게임이 올라갔어요!');
}

// Profile
function renderProfile(){
  if(!currentUser) return;
  const u = currentUser;
  document.getElementById('prof-avatar').textContent = u.name[0];
  document.getElementById('prof-name').textContent = u.name;
  document.getElementById('prof-sub').textContent = 'Stanford University · '+u.interests.join(' ');
  const temp = u.temp||36.5;
  document.getElementById('prof-temp').textContent = temp.toFixed(1)+'°C';
  document.getElementById('prof-temp-bar').style.width = Math.min(temp,50)/50*100+'%';
  document.getElementById('s-joined').textContent = u.joined||0;
  document.getElementById('s-hosted').textContent = u.hosted||0;
  document.getElementById('s-bookmarks').textContent = games.filter(g=>(g.bookmarks||[]).includes(u.id)).length;
  const earnedIds = (u.badges||[]);
  document.getElementById('badges-grid').innerHTML = BADGES.map(b=>`
    <div class="badge-item${earnedIds.includes(b.id)?' earned':''}" title="${b.desc}">
      <div class="badge-emoji">${b.emoji}</div>
      <div class="badge-name">${b.name}</div>
    </div>
  `).join('');
  const myGames = games.filter(g=>g.players.includes(u.id)||(g.hostId===u.id));
  const myGamesEl = document.getElementById('my-games-list');
  if(myGames.length===0){
    myGamesEl.innerHTML='<div style="text-align:center;padding:30px;color:#aaa">아직 참여한 게임이 없어요<br>첫 게임에 참여해보세요! 🎮</div>';
  } else {
    myGamesEl.innerHTML = myGames.map(g=>{
      const t=getType(g.typeId);
      const full=isFull(g);
      const isHost=g.hostId===u.id;
      return`<div class="my-game-row" onclick="openGame('${g.id}')">
        <div class="my-game-thumb" style="background:${t.color}20">${t.emoji}</div>
        <div class="my-game-info">
          <div class="my-game-title">${g.title}</div>
          <div class="my-game-sub">${g.location} · ${g.players.length}/${g.capacity}명 ${t.flag}</div>
        </div>
        <span class="my-game-status" style="background:${isHost?'#fff3e0':full?'#ffebee':'#e8f5e9'};color:${isHost?'#ff6f0f':full?'#c62828':'#2e7d32'}">${isHost?'주최':'참여'}</span>
      </div>`;
    }).join('');
  }
}

function checkBadges(){
  if(!currentUser) return;
  const u = currentUser;
  let earned = u.badges||[];
  let newBadges = [];
  BADGES.forEach(b=>{
    if(!earned.includes(b.id) && b.check(u)){
      earned.push(b.id);
      newBadges.push(b);
    }
  });
  if(newBadges.length){
    u.badges = earned;
    if(u.temp < 42) u.temp = Math.min(50, (u.temp||36.5) + newBadges.length * 0.5);
    S.set('sg_user',u);
    newBadges.forEach((b,i)=>{
      setTimeout(()=>showToast(`🏅 새 뱃지: ${b.emoji} ${b.name}!`),i*1500);
    });
    renderProfile();
  }
}

function editProfile(){
  const name = prompt('닉네임 변경:', currentUser.name);
  if(name && name.trim()){
    currentUser.name = name.trim();
    S.set('sg_user',currentUser);
    renderProfile();
  }
}

function renderOnboardInts(){
  const el = document.getElementById('ob-ints');
  let sel = [];
  el.innerHTML = INTERESTS.map(int=>`<div class="int-chip" onclick="obToggleInt(this,'${int}','${encodeURIComponent(int)}')">${int}</div>`).join('');
}

let obInts = [];
function obToggleInt(el, int){
  const idx = obInts.indexOf(int);
  if(idx>=0){obInts.splice(idx,1);el.classList.remove('on');}
  else if(obInts.length<3){obInts.push(int);el.classList.add('on');}
  else showToast('관심사는 3개까지 선택 가능합니다');
}

function onboardSubmit(){
  const name = document.getElementById('ob-name').value.trim();
  if(!name){showToast('닉네임을 입력해주세요!');return;}
  if(obInts.length<1){showToast('관심사를 1개 이상 선택해주세요!');return;}
  currentUser = {
    id: 'u'+Date.now(),
    name,
    interests: obInts,
    temp: 36.5,
    joined: 0,
    hosted: 0,
    joinedGames: [],
    badges: [],
    gameTypes: []
  };
  S.set('sg_user',currentUser);
  document.getElementById('onboard').style.display='none';
  renderAll();
  showToast('환영해요, '+name+'님! 🎉');
}

// Page nav
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(page==='feed') document.getElementById('nav-home').classList.add('active');
  if(page==='profile'){document.getElementById('nav-profile').classList.add('active');renderProfile();}
  if(page==='create') renderCreateForm();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

init();
</script>
